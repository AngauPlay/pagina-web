<!doctype html>

  <link
			rel="stylesheet"

		/>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css"
		/>

        <style>
			:root {
				--pink-accent: rgb(224, 35, 117);
				--purple-main: rgb(104, 89, 165);
				--blue-dark: rgb(68, 99, 174);
				--yellow-neon: rgb(229, 235, 53);
				--green-light: rgb(140, 199, 73);
			}

			.bg-purple-main {
				background-color: var(--purple-main);
			}
			.bg-pink-accent {
				background-color: var(--pink-accent);
			}
			.text-pink-accent {
				color: var(--pink-accent);
			}
			.text-green-light {
				color: var(--green-light);
			}
			.text-yellow-neon {
				color: var(--yellow-neon);
			}
			.border-purple-main {
				border-color: var(--purple-main);
			}

			/* Estilo para los contenedores de patrocinadores */
			.sponsor-slot {
				background: #f8fafc;
				border: 2px dashed #e2e8f0;
				display: flex;
				align-items: center;
				justify-content: center;
				position: relative;
				overflow: hidden;
				transition: all 0.3s ease;
			}
			.sponsor-label {
				position: absolute;
				top: 0;
				right: 0;
				background: #e2e8f0;
				color: #94a3b8;
				font-size: 9px;
				padding: 2px 8px;
				text-transform: uppercase;
				font-weight: 900;
				letter-spacing: 0.05em;
			}

	

			#articulo-cuerpo p {
				margin-bottom: 1.5rem;
				line-height: 1.8;
				font-size: 1.125rem;
				color: #334155;
			}

			#articulo-cuerpo strong {
				color: var(--purple-main);
				font-weight: 800;
			}

			.loading-pulse {
				animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
			}
			@keyframes pulse {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0.5;
				}
			}

			#articulo-imagen,
			.galeria-item img {
				cursor: zoom-in;
			}
		</style>
</head>
