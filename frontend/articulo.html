<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cargando noticia... | ANGAU PLAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --pink-accent: rgb(224, 35, 117);
        --purple-main: rgb(104, 89, 165);
        --blue-dark: rgb(68, 99, 174);
        --yellow-neon: rgb(229, 235, 53);
        --green-light: rgb(140, 199, 73);
      }

      /* Clases personalizadas para igualar la Home */
      .bg-purple-main {
        background-color: var(--purple-main);
      }
      .bg-pink-accent {
        background-color: var(--pink-accent);
      }
      .text-pink-accent {
        color: var(--pink-accent);
      }
      .text-green-light {
        color: var(--green-light);
      }
      .text-yellow-neon {
        color: var(--yellow-neon);
      }
      .border-purple-main {
        border-color: var(--purple-main);
      }

      /* Estilo del cuerpo del artículo */
      #articulo-cuerpo p {
        margin-bottom: 1.5rem;
        line-height: 1.8;
        font-size: 1.125rem;
        color: #334155; /* slate-700 */
      }

      #articulo-cuerpo strong {
        color: var(--purple-main);
        font-weight: 800;
      }

      .loading-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body class="bg-gray-50 font-sans text-slate-900">
    <header
      class="bg-purple-main text-white p-4 sticky top-0 z-[100] shadow-xl border-b border-white/10"
    >
      <div class="container mx-auto flex justify-between items-center">
        <div class="flex items-center gap-4">
          <button
            onclick="
              window.history.length > 1
                ? window.history.back()
                : (window.location.href = 'index.html')
            "
            class="text-2xl hover:text-yellow-neon transition-all p-2 rounded-lg"
          >
            <i class="fas fa-arrow-left"></i>
          </button>
          <div class="container mx-auto grid grid-cols-3 items-center">
            <div class="flex items-center">
              <button
                id="menu-btn"
                class="text-2xl hover:bg-white/10 transition-all p-2 rounded-lg"
              >
                <i class="fas fa-bars"></i>
              </button>
    
              <span
                class="text-[10px] font-bold text-white/80 uppercase tracking-wider"
              >
                El primer canal de streaming formoseño
              </span>
            </div>
    
            <!-- LOGO -->
            <div class="flex justify-center">
              <a href="index.html">
                <img
                  src="/assets/cmpleto logo@4x.png"
                  alt="Angau Play"
                  class="h-10 md:h-12 object-contain cursor-pointer hover:scale-110 transition"
                />
              </a>
            </div>
    
            <div class="flex items-center justify-end gap-4">
              <!-- REDES -->
              <div class="flex gap-3 items-center">
                <a href="https://www.youtube.com/@AngauPlay" target="_blank">
                  <img
                    src="/assets/logo-youtube.png"
                    class="w-6 h-6 hover:scale-125 transition duration-300"
                    alt="YouTube"
                  />
                </a>
    
                <a href="https://www.facebook.com/angauplay" target="_blank">
                  <img
                    src="/assets/logo-facebook.png"
                    class="w-6 h-6 hover:scale-125 transition duration-300"
                    alt="Facebook"
                  />
                </a>
    
                <a href="https://kick.com/angauplay" target="_blank">
                  <img
                    src="/assets/logo-kick.png"
                    class="w-6 h-6 hover:scale-125 transition duration-300"
                    alt="Kick"
                  />
                </a>
    
                <a href="https://www.twitch.tv/angauplay" target="_blank">
                  <img
                    src="/assets/logo-twitch.png"
                    class="w-6 h-6 hover:scale-125 transition duration-300"
                    alt="Twitch"
                  />
                </a>
    
                <a href="https://www.tiktok.com/@angauplay" target="_blank">
                  <img
                    src="/assets/logo-tik-tok.png"
                    class="w-6 h-6 hover:scale-125 transition duration-300"
                    alt="TikTok"
                  />
                </a>
    
                <a href="https://www.instagram.com/angauplay.ok/" target="_blank">
                  <img
                    src="/assets/logo-instagram.png"
                    class="w-6 h-6 hover:scale-125 transition duration-300"
                    alt="Instagram"
                  />
                </a>
              </div>
    
              <img
                src="/assets/matesito@4x.png"
                class="h-10 md:h-12 object-contain hover:scale-110 transition-transform ml-6"
              />
            </div>
          </div>
    
          <div
            id="mobile-menu"
            class="fixed top-0 left-0 w-72 bg-blue-dark h-screen p-6 shadow-2xl transform -translate-x-full transition-transform duration-300 z-[110]"
          >
            <div class="flex justify-between items-center mb-10">
              <span
                class="text-yellow-neon font-black italic text-xl tracking-widest uppercase"
                >Menú</span
              >
              <button
                id="close-menu"
                class="text-white hover:text-yellow-neon transition-colors"
              >
                <i class="fas fa-times text-2xl"></i>
              </button>
            </div>
            <nav class="flex flex-col gap-6 text-lg text-white font-bold">
              <a
                href="#"
                class="text-yellow-neon border-l-4 border-yellow-neon pl-2"
                >INICIO</a
              >
              <a href="politica.html" class="hover:text-blue-200 transition-colors"
                >Política</a
              >
              <a
                href="tecnologia.html"
                class="hover:text-blue-200 transition-colors"
                >Tecnología</a
              >
              <a href="deportes.html" class="hover:text-blue-200 transition-colors"
                >Deportes</a
              >
              <a href="Economia.html" class="hover:text-blue-200 transition-colors"
                >Economía</a
              >
              <a href="cultura.html" class="hover:text-blue-200 transition-colors"
                >Cultura</a
              >
              <a
                href="actualidad.html"
                class="hover:text-blue-200 transition-colors"
                >Actualidad</a
              >
              <a href="salud.html" class="hover:text-blue-200 transition-colors"
                >Salud</a
              >
            </nav>
          </div>
          <div
            id="overlay"
            class="fixed inset-0 bg-black/60 hidden z-[105] backdrop-blur-sm"
          ></div>
        </header>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
      <div id="loading-state" class="text-center py-20">
        <div
          class="loading-pulse text-purple-main text-xl font-black italic uppercase tracking-widest"
        >
          Sincronizando señal...
        </div>
      </div>

      <div
        id="articulo-content"
        class="hidden flex flex-col lg:flex-row gap-12"
      >
        <article class="lg:w-2/3">
          <span
            id="articulo-categoria"
            class="bg-pink-accent text-white text-[10px] font-black px-4 py-1 rounded-full uppercase tracking-widest shadow-lg shadow-pink-500/20"
          ></span>

          <h1
            id="articulo-titulo"
            class="text-4xl md:text-5xl font-black mt-6 mb-8 leading-tight text-slate-900 italic tracking-tighter"
          ></h1>

          <div
            class="flex items-center gap-4 mb-10 text-sm text-slate-500 border-b border-slate-200 pb-8"
          >
            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 bg-purple-main rounded-xl flex items-center justify-center text-yellow-neon font-black text-xs shadow-lg"
                id="autor-iniciales"
              >
                AP
              </div>
              <div>
                <span
                  class="font-black text-slate-800 block leading-none"
                  id="articulo-autor"
                  >REDACCIÓN ANGAU</span
                >
                <span class="text-[10px] uppercase tracking-tighter"
                  >Formosa, Argentina</span
                >
              </div>
            </div>
            <span class="text-slate-300">|</span>
            <time
              id="articulo-fecha"
              class="font-mono font-bold text-purple-main"
            ></time>
          </div>

          <div
            class="rounded-3xl overflow-hidden shadow-2xl mb-12 border-4 border-white"
          >
            <img
              id="articulo-imagen"
              src=""
              alt=""
              class="w-full h-auto object-cover"
            />
          </div>

          <div
            id="articulo-cuerpo"
            class="prose prose-slate prose-lg max-w-none"
          ></div>

          <div
            id="video-container"
            class="mt-16 p-8 bg-pink-accent rounded-3xl shadow-2xl relative overflow-hidden hidden"
          >
            <div class="absolute top-0 right-0 p-4 opacity-10">
              <i class="fas fa-play text-8xl text-white"></i>
            </div>
            <h3
              class="text-white text-sm font-black mb-6 uppercase flex items-center gap-3 relative z-10"
            >
              <span
                class="w-3 h-3 bg-yellow-neon rounded-full animate-pulse shadow-[0_0_10px_#e5eb35]"
              ></span>
              Contenido Multimedia
            </h3>
            <div
              class="aspect-video rounded-2xl overflow-hidden border-2 border-white/20 shadow-inner relative z-10"
            >
              <iframe
                id="articulo-video"
                class="w-full h-full"
                src=""
                frameborder="0"
                allowfullscreen
              ></iframe>
            </div>
          </div>
        </article>

        <aside class="lg:w-1/3">
          <div class="sticky top-28 space-y-8">
            <div
              class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 relative overflow-hidden"
            >
              <div
                class="absolute top-0 left-0 w-2 h-full bg-purple-main"
              ></div>
              <h4
                class="font-black text-slate-900 mb-8 uppercase italic flex items-center justify-between"
              >
                LO ÚLTIMO <i class="fas fa-bolt text-yellow-500"></i>
              </h4>
              <div id="sidebar-recientes" class="space-y-8"></div>
            </div>

            <div
              class="bg-purple-main p-8 rounded-3xl text-white shadow-2xl text-center group cursor-pointer"
              onclick="window.location.href = 'index.html'"
            >
              <h5
                class="font-black text-xl italic mb-2 group-hover:text-yellow-neon transition-colors"
              >
                ¿TE PERDISTE ALGO?
              </h5>
              <p class="text-xs text-white/70 mb-4 uppercase tracking-widest">
                Explora toda la portada de hoy
              </p>
              <div
                class="inline-block bg-pink-accent px-6 py-2 rounded-full font-black text-[10px] tracking-widest uppercase"
              >
                VOLVER AL VIVO
              </div>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <script src="js/articulo.js"></script>
  </body>
</html>
