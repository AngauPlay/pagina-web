<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login - ANGAU PLAY</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      :root {
        --pink: rgb(224, 35, 117);
        --purple: rgb(104, 89, 165);
        --blue: rgb(68, 99, 174);
        --yellow: rgb(229, 235, 53);
        --green: rgb(140, 199, 73);
      }

      .bg-main {
        background: var(--purple);
      }
      .bg-accent {
        background: var(--pink);
      }
      .text-accent {
        color: var(--pink);
      }
    </style>
  </head>

  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div
      class="bg-white shadow-2xl rounded-3xl flex flex-col md:flex-row w-11/12 md:w-3/4 max-w-4xl overflow-hidden"
    >
      <!-- IMAGEN -->
      <div class="bg-main flex justify-center items-center p-8 md:w-1/2">
        <img src="/assets/mascota.png" class="w-72" />
      </div>

      <!-- FORM -->
      <div class="flex flex-col justify-center p-8 md:w-1/2">
        <h2 class="text-3xl font-black mb-6">
          Bienvenido a <span class="text-accent">ANGAU PLAY</span>
        </h2>

        <form id="loginForm" class="space-y-5">
          <input
            type="nombre"
            name="nombre"
            placeholder="Nombre de usuario"
            class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-purple-500"
            required
          />

          <div class="relative">
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Contraseña"
              class="w-full border p-3 rounded-lg pr-10 focus:ring-2 focus:ring-purple-500"
              required
            />

            <button
              type="button"
              id="togglePassword"
              class="absolute right-3 top-3 text-gray-500"
            >
              <i data-lucide="eye"></i>
            </button>
          </div>

          <button
            class="w-full bg-accent text-white py-3 rounded-xl font-bold hover:opacity-90"
          >
            INGRESAR
          </button>
        </form>

        <p id="mensaje" class="mt-4 text-center font-bold"></p>

        <p class="text-center mt-4">
          ¿No tenés cuenta?
          <a href="register.html" class="text-accent font-bold"> Registrate </a>
        </p>
      </div>
    </div>

    <script src="js/login.js"></script>

    <script>
      lucide.createIcons();

      document.getElementById("togglePassword").onclick = () => {
        const input = document.getElementById("password");
        input.type = input.type === "password" ? "text" : "password";
      };
    </script>
  </body>
</html>
