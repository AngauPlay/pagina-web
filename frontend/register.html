<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - ANGAU PLAY</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --pink: rgb(224,35,117);
      --purple: rgb(104,89,165);
      --blue: rgb(68,99,174);
      --yellow: rgb(229,235,53);
      --green: rgb(140,199,73);
    }

    .bg-main { background: var(--purple); }
    .bg-accent { background: var(--pink); }
    .text-accent { color: var(--pink); }
  </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-2xl rounded-3xl flex flex-col md:flex-row w-11/12 md:w-3/4 max-w-4xl overflow-hidden">

  <!-- IMAGEN -->
  <div class="bg-main flex justify-center items-center p-8 md:w-1/2">
    <img src="/assets/mascota.png" class="w-72">
  </div>

  <!-- FORM -->
  <div class="flex flex-col justify-center p-8 md:w-1/2">

    <h2 class="text-3xl font-black mb-6">
      Crear cuenta <span class="text-accent">ANGAU</span>
    </h2>

    <form id="registerForm" class="space-y-5">

      <input type="text" name="nombre" placeholder="Nombre"
        class="w-full border p-3 rounded-lg" required>

      <input type="email" name="email" placeholder="Correo"
        class="w-full border p-3 rounded-lg" required>

      <div class="relative">
        <input type="password" name="password" id="password"
          placeholder="Contraseña"
          class="w-full border p-3 rounded-lg pr-10"
          required>

        <button type="button" id="togglePassword"
          class="absolute right-3 top-3 text-gray-500">
          <i data-lucide="eye"></i>
        </button>
      </div>

      <!-- Rol -->
      <select name="rol" class="w-full border p-3 rounded-lg">
        <option value="editor">Editor</option>
        <option value="admin">Admin</option>
      </select>

      <button class="w-full bg-main text-white py-3 rounded-xl font-bold">
        REGISTRARSE
      </button>

    </form>

    <p id="mensaje" class="mt-4 text-center font-bold"></p>

    <p class="text-center mt-4">
      ¿Ya tenés cuenta?
      <a href="login.html" class="text-accent font-bold">
        Iniciar sesión
      </a>
    </p>

  </div>

</div>

<script src="js/register.js"></script>

<script>
  lucide.createIcons();

  document.getElementById("togglePassword").onclick = () => {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
  };
</script>

</body>
</html>
