<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Categoría | ANGAU PLAY</title>

		<script src="https://cdn.tailwindcss.com"></script>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
		/>

		<style>
			:root {
				--pink-accent: rgb(224, 35, 117);
				--purple-main: rgb(104, 89, 165);
				--blue-dark: rgb(68, 99, 174);
				--yellow-neon: rgb(229, 235, 53);
			}

			.bg-purple-main {
				background-color: var(--purple-main);
			}
			.bg-pink-accent {
				background-color: var(--pink-accent);
			}
			.text-pink-accent {
				color: var(--pink-accent);
			}
			.text-yellow-neon {
				color: var(--yellow-neon);
			}

			body.menu-open {
				overflow: hidden;
			}
		</style>
	</head>

	<body class="bg-gray-50 font-sans text-slate-900">
		<!-- HEADER -->
		<header
			class="bg-purple-main text-white p-4 sticky top-0 z-[100] shadow-xl border-b border-white/10"
		>
			<div class="container mx-auto flex justify-between items-center">
				<div class="flex items-center gap-4">
					<button
						onclick="
							window.history.length > 1
								? window.history.back()
								: (window.location.href = 'index.html')
						"
						class="text-2xl hover:text-yellow-neon transition-all p-2 rounded-lg"
					>
						<i class="fas fa-arrow-left"></i>
					</button>

					<span
						class="hidden md:block text-[10px] font-bold text-white/80 uppercase tracking-wider"
					>
						El primer canal de streaming formoseño
					</span>
				</div>

				<div class="flex justify-center">
					<a href="index.html">
						<img
							src="/assets/cmpleto logo@4x.png"
							alt="Angau Play"
							class="h-10 md:h-12 object-contain cursor-pointer hover:scale-110 transition"
						/>
					</a>
				</div>
				<div class="flex items-center justify-end gap-4">
					<!-- REDES -->
					<div class="flex gap-3 items-center">
						<a href="https://www.youtube.com/@AngauPlay" target="_blank">
							<img
								src="/assets/logo-youtube.png"
								class="w-6 h-6 hover:scale-125 transition duration-300"
								alt="YouTube"
							/>
						</a>

						<a href="https://www.facebook.com/angauplay" target="_blank">
							<img
								src="/assets/logo-facebook.png"
								class="w-6 h-6 hover:scale-125 transition duration-300"
								alt="Facebook"
							/>
						</a>

						<a href="https://kick.com/angauplay" target="_blank">
							<img
								src="/assets/logo-kick.png"
								class="w-6 h-6 hover:scale-125 transition duration-300"
								alt="Kick"
							/>
						</a>

						<a href="https://www.twitch.tv/angauplay" target="_blank">
							<img
								src="/assets/logo-twitch.png"
								class="w-6 h-6 hover:scale-125 transition duration-300"
								alt="Twitch"
							/>
						</a>

						<a href="https://www.tiktok.com/@angauplay" target="_blank">
							<img
								src="/assets/logo-tik-tok.png"
								class="w-6 h-6 hover:scale-125 transition duration-300"
								alt="TikTok"
							/>
						</a>

						<a href="https://www.instagram.com/angauplay.ok/" target="_blank">
							<img
								src="/assets/logo-instagram.png"
								class="w-6 h-6 hover:scale-125 transition duration-300"
								alt="Instagram"
							/>
						</a>
						<a href="https://wa.me/5493704808722" target="_blank">
							<i
								class="fab fa-whatsapp text-white text-xl hover:scale-125 transition duration-300"
							></i>
						</a>
					</div>

					<img
						src="/assets/matesito@4x.png"
						class="h-10 md:h-12 object-contain hover:scale-110 transition-transform ml-6"
					/>
				</div>
			</div>

			<div
				id="overlay"
				class="fixed inset-0 bg-black/60 hidden z-[105] backdrop-blur-sm"
			></div>
		</header>

		<!-- TITULO -->
		<section class="container mx-auto px-4 mt-8">
			<h2
				id="titulo-categoria"
				class="text-4xl font-black border-l-8 pl-4 border-pink-500"
			>
				CARGANDO...
			</h2>
		</section>
		<div class="container mx-auto px-4 mt-6">
			<div id="hero-promos-wrapper" class="w-full h-24 md:h-32"></div>
		</div>
		<!-- DESTACADA -->
		<section class="container mx-auto px-4 mt-8">
			<div id="destacada"></div>
		</section>

		<div class="container mx-auto px-4 mt-10"></div>

		<!-- LISTADO -->
		<section class="container mx-auto px-4 py-10">
			<h3 class="text-2xl font-black mb-6">Últimas noticias</h3>

			<div
				id="noticias-container"
				class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"
			></div>
		</section>

		<!-- FOOTER -->
		<footer
			class="bg-gradient-to-r from-[rgb(198,29,102)] via-[rgb(104,89,165)] to-[rgb(68,99,174)] text-white mt-16"
		>
			<!-- LOGO -->
			<div class="flex justify-center pt-8">
				<img
					src="/assets/logo blanco@4x.png"
					alt="Angau Play"
					class="h-14 object-contain hover:scale-110 transition-transform duration-300"
				/>
			</div>

			<div class="container mx-auto px-4 py-10 grid md:grid-cols-2 gap-10">
				<!-- CONTACTO -->
				<div>
					<h3 class="text-xl font-bold mb-4">Contacto</h3>
					<ul class="space-y-2 text-white/80">
						<li>
							<a
								href="mailto:angauplay@gmail.com"
								class="flex items-center gap-2 hover:text-yellow-neon transition"
							>
								<i class="fas fa-envelope"></i>
								angauplay@gmail.com
							</a>
						</li>

						<li>
							<i class="fas fa-map-marker-alt mr-2"></i> Formosa, Argentina
						</li>

						<!-- WHATSAPP -->
						<li>
							<a
								href="https://wa.me/5493704808722"
								target="_blank"
								class="flex items-center gap-2 hover:text-green-300 transition"
							>
								<i class="fab fa-whatsapp text-green-400"></i>
								+54 9 370 480-8722
							</a>
						</li>
					</ul>
				</div>

				<!-- DESARROLLO -->
				<div class="text-center md:text-right">
					<h3 class="text-xl font-bold mb-4">Desarrollado por</h3>
					<p class="text-white/80 text-sm leading-relaxed">
						Franco Mirna & Ocampo Emiliano <br />
						<span class="text-yellow-neon font-semibold">
							Egresados del Instituto Politécnico Formosa
						</span>
					</p>
					<div class="mt-4 flex justify-center md:justify-end">
						<img
							src="assets/logo-ipf.png"
							alt="IPF"
							class="w-24 h-auto bg-white/10 p-2 rounded-xl"
						/>
					</div>
				</div>
			</div>

			<div
				class="text-center text-sm py-4 border-t border-white/20 uppercase tracking-widest font-bold"
			>
				© 2026 Angau Play
			</div>
		</footer>

		<script src="js/categoria.js"></script>
	</body>
</html>
