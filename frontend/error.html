<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERROR 404 | ANGAU PLAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      @keyframes glitch {
        0% {
          transform: translate(0);
        }
        20% {
          transform: translate(-5px, 5px);
        }
        40% {
          transform: translate(-5px, -5px);
        }
        60% {
          transform: translate(5px, 5px);
        }
        80% {
          transform: translate(5px, -5px);
        }
        100% {
          transform: translate(0);
        }
      }
      .glitch-text {
        animation: glitch 0.3s linear infinite;
        opacity: 0.8;
      }
      .bg-crt {
        background:
          linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.06),
            rgba(0, 255, 0, 0.02),
            rgba(0, 0, 255, 0.06)
          );
        background-size:
          100% 2px,
          3px 100%;
      }
    </style>
  </head>
  <body
    class="bg-slate-900 text-white font-sans h-screen flex flex-col justify-center items-center bg-crt overflow-hidden"
  >
    <div class="text-center p-10 z-10">
      <div
        class="text-8xl mb-6 text-pink-500 drop-shadow-[0_0_15px_rgba(224,35,117,0.8)]"
      >
        <i class="fas fa-satellite-dish animate-bounce"></i>
      </div>

      <h1
        class="text-6xl md:text-9xl font-black italic tracking-tighter text-yellow-300 mb-4"
      >
        ERROR <span class="glitch-text text-white">404</span>
      </h1>

      <p
        class="text-xl md:text-2xl font-bold uppercase tracking-widest text-green-400 mb-8"
      >
        Se perdió la señal en Formosa
      </p>

      <p
        class="text-slate-400 max-w-md mx-auto mb-10 text-sm md:text-base italic"
      >
        "Parece que esta noticia todavía no se inventó o el servidor se fue a
        tomar un tereré."
      </p>

      <div class="flex flex-col md:flex-row gap-4 justify-center">
        <a
          href="index.html"
          class="bg-pink-600 hover:bg-pink-700 text-white font-black py-4 px-8 rounded-full transition-all hover:scale-105 shadow-[0_0_20px_rgba(224,35,117,0.5)] uppercase tracking-widest text-xs"
        >
          <i class="fas fa-home mr-2"></i> Volver a la Portada
        </a>
        <button
          onclick="window.history.back()"
          class="bg-transparent border-2 border-white/20 hover:border-yellow-300 hover:text-yellow-300 text-white font-black py-4 px-8 rounded-full transition-all text-xs uppercase tracking-widest"
        >
          <i class="fas fa-arrow-left mr-2"></i> Reintentar
        </button>
      </div>
    </div>

    <div class="absolute inset-0 opacity-20 pointer-events-none">
      <div
        class="absolute top-10 left-10 text-pink-500 text-6xl rotate-12 italic font-black"
      >
        ANGAU
      </div>
      <div
        class="absolute bottom-20 right-10 text-green-500 text-4xl -rotate-12 italic font-black italic"
      >
        PERDIMOS LA CONEXIÓN
      </div>
    </div>
  </body>
</html>
